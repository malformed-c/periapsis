---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-proxy
  namespace: envoy-gateway-system

spec:
  extraArgs:
    - "--base-id 1"

  provider:
    type: Kubernetes
    kubernetes:
      envoyDaemonSet:
        patch:
          type: StrategicMerge
          value:
            spec:
              template:
                spec:
                  hostNetwork: true
                  dnsPolicy: ClusterFirstWithHostNet

        pod:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  # LOGIC: (Edge) OR (Control Plane)

                  # Option 1: Is it an Edge node?
                  - matchExpressions:
                      - key: node-role.kubernetes.io/edge
                        operator: Exists

                  # Option 2: Is it a Control Plane node?
                  - matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: Exists

                  # Option 3: Is it a Primary (perigeos) node?
                  - matchExpressions:
                      - key: node-role.kubernetes.io/primary
                        operator: Exists

          tolerations:
            - key: node-role.kubernetes.io/edge
              operator: Exists
              effect: NoSchedule
            - key: node-role.kubernetes.io/primary
              operator: Exists
              effect: NoSchedule
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule

        container:
          resources:
            requests:
              cpu: 100m
              memory: 32Mi

            limits:
              cpu: 1
              memory: 100Mi

          securityContext:
            capabilities:
              add:
                - NET_BIND_SERVICE

            runAsUser: 0
            runAsGroup: 0

      envoyService:
        type: ClusterIP

      useListenerPortAsContainerPort: true
