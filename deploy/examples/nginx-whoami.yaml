---
apiVersion: v1
kind: Namespace
metadata:
  name: nginx-demo

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-whoami-config
  namespace: nginx-demo

data:
  nginx.conf: |
    # worker_processes auto lets nginx use available CPUs up to the CPU limit.
    worker_processes auto;
    error_log /tmp/nginx-error.log warn;
    pid /tmp/nginx.pid;

    events {
      # 64 is far too low for load testing. At 1000 VUs spread across N pods
      # each pod handles ~1000/N concurrent connections. 1024 gives headroom.
      worker_connections 1024;
      multi_accept on;
    }

    http {
      access_log off;
      default_type text/html;

      keepalive_timeout 65;
      keepalive_requests 10000;
      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;

      server {
        # reuseport is meaningful only with multiple worker processes.
        listen 8080;
        root /www;
        location / {
          try_files /index.html =404;
        }
      }
    }

  page.sh: |
    #!/bin/sh
    cat > /www/index.html <<HTML
    <!DOCTYPE html>
    <html>
    <head>
      <title>perigeos</title>
      <meta charset="utf-8">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: 'SF Mono', 'Fira Code', monospace;
          background: #0d1117;
          color: #c9d1d9;
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 100vh;
        }
        .card {
          background: #161b22;
          border: 1px solid #30363d;
          border-radius: 12px;
          padding: 2.5rem 3rem;
          min-width: 420px;
          box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        h1 {
          color: #f0883e;
          font-size: 1.8rem;
          margin-bottom: 1.5rem;
          letter-spacing: -0.5px;
        }
        .field {
          display: flex;
          justify-content: space-between;
          padding: 0.6rem 0;
          border-bottom: 1px solid #21262d;
        }
        .field:last-child { border-bottom: none; }
        .label { color: #8b949e; }
        .value { color: #58a6ff; font-weight: 600; }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>&#9670; perigeos</h1>
        <div class="field"><span class="label">pawn</span><span class="value">${NODE_NAME}</span></div>
        <div class="field"><span class="label">pod</span><span class="value">${POD_NAME}</span></div>
        <div class="field"><span class="label">uid</span><span class="value">${POD_UID}</span></div>
        <div class="field"><span class="label">ip</span><span class="value">${POD_IP}</span></div>
      </div>
    </body>
    </html>
    HTML

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-whoami
  namespace: nginx-demo

spec:
  # Starting point for manual testing. For stress tests scale via:
  #   kubectl scale deployment nginx-whoami -n nginx-demo --replicas=200
  # The topologySpreadConstraints below will spread replicas evenly across nodes.
  replicas: 1
  selector:
    matchLabels:
      app: nginx-whoami

  template:
    metadata:
      labels:
        app: nginx-whoami

    spec:
      # Spread pods across nodes so the distribution chart in the stress test
      # reflects real multi-node routing. Without this all 6 pods can land on
      # the same node and the pawn histogram will show a single bar.
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: nginx-whoami

      initContainers:
      - name: page-gen
        image: docker.io/library/alpine:latest
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 50m
            memory: 8Mi
          limits:
            cpu: 50m
            memory: 16Mi

        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name

        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid

        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName

        # NOTE: status.podIP is empty in standard Kubernetes during init
        # container execution (IP is assigned after init containers finish).
        # This works in perigeos because CNI runs and PromoteRunning sets the
        # IP before init containers are launched (lifecycle.go step1 → step3).
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP

        command: ["/bin/sh", "/config/page.sh"]
        volumeMounts:
        - name: www
          mountPath: /www

        - name: config
          mountPath: /config

      containers:
      - name: nginx
        # Pin minor version to avoid silent drift.
        # alpine variant keeps image small.
        image: docker.io/library/nginx:alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 64Mi

        command:
        - /bin/sh
        - -c
        - |
          rm -f /var/log/nginx/error.log /var/log/nginx/access.log
          touch /var/log/nginx/error.log /var/log/nginx/access.log
          exec nginx -c /config/nginx.conf -g 'daemon off;'

        volumeMounts:
        - name: www
          mountPath: /www
          readOnly: true

        - name: config
          mountPath: /config
          readOnly: true

        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 1
          periodSeconds: 3

        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10

      volumes:
      - name: www
        emptyDir: {}

      - name: config
        configMap:
          name: nginx-whoami-config

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-whoami
  namespace: nginx-demo

spec:
  type: NodePort
  selector:
    app: nginx-whoami

  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30080
