apiVersion: v1
kind: Namespace
metadata:
  name: nginx-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-whoami-config
  namespace: nginx-demo
data:
  nginx.conf: |
    worker_processes 1;
    error_log /tmp/nginx-error.log warn;
    pid /tmp/nginx.pid;
    events { worker_connections 64; }
    http {
      access_log off;
      default_type text/html;
      server {
        listen 8080;
        root /www;
        location / {
          try_files /index.html =404;
        }
      }
    }
  page.sh: |
    #!/bin/sh
    cat > /www/index.html <<HTML
    <!DOCTYPE html>
    <html>
    <head>
      <title>perigeos</title>
      <meta charset="utf-8">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: 'SF Mono', 'Fira Code', monospace;
          background: #0d1117;
          color: #c9d1d9;
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 100vh;
        }
        .card {
          background: #161b22;
          border: 1px solid #30363d;
          border-radius: 12px;
          padding: 2.5rem 3rem;
          min-width: 420px;
          box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        h1 {
          color: #f0883e;
          font-size: 1.8rem;
          margin-bottom: 1.5rem;
          letter-spacing: -0.5px;
        }
        .field {
          display: flex;
          justify-content: space-between;
          padding: 0.6rem 0;
          border-bottom: 1px solid #21262d;
        }
        .field:last-child { border-bottom: none; }
        .label { color: #8b949e; }
        .value { color: #58a6ff; font-weight: 600; }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>&#9670; perigeos</h1>
        <div class="field"><span class="label">pawn</span><span class="value">${NODE_NAME}</span></div>
        <div class="field"><span class="label">pod</span><span class="value">${POD_NAME}</span></div>
        <div class="field"><span class="label">uid</span><span class="value">${POD_UID}</span></div>
        <div class="field"><span class="label">ip</span><span class="value">${POD_IP}</span></div>
      </div>
    </body>
    </html>
    HTML
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-whoami
  namespace: nginx-demo
spec:
  replicas: 6
  selector:
    matchLabels:
      app: nginx-whoami
  template:
    metadata:
      labels:
        app: nginx-whoami
    spec:
      initContainers:
      - name: page-gen
        image: docker.io/library/alpine:3.21
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        command: ["/bin/sh", "/config/page.sh"]
        volumeMounts:
        - name: www
          mountPath: /www
        - name: config
          mountPath: /config
      containers:
      - name: nginx
        image: docker.io/library/nginx:alpine
        ports:
        - containerPort: 8080
        command:
        - /bin/sh
        - -c
        - |
          rm -f /var/log/nginx/error.log /var/log/nginx/access.log
          touch /var/log/nginx/error.log /var/log/nginx/access.log
          exec nginx -c /config/nginx.conf -g 'daemon off;'
        volumeMounts:
        - name: www
          mountPath: /www
          readOnly: true
        - name: config
          mountPath: /config
          readOnly: true
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 1
          periodSeconds: 3
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: www
        emptyDir: {}
      - name: config
        configMap:
          name: nginx-whoami-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-whoami
  namespace: nginx-demo
spec:
  type: NodePort
  selector:
    app: nginx-whoami
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30080
